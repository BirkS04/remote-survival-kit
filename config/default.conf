# =========================================================
# REMOTE SURVIVAL KIT - CONFIGURATION TEMPLATE
# =========================================================
# Diese Variablen werden vom install.sh Skript abgefragt
# und auf dem System unter /etc/remote-survival/survival.conf gespeichert.

# --- NODE ROLLEN ---
# Mögliche Werte: "PRIMARY" (Raspberry Pi) oder "RECOVERY" (Beelink)
NODE_ROLE="PRIMARY"

# --- NETZWERK & ZIELE ---
ROUTER_IP="192.168.178.1"
INTERNET_TEST_IP="8.8.8.8"
TAILSCALE_TEST_IP="100.100.100.100" # Eine zuverlässige IP im Tailscale-Netz

# --- GERÄTE-DATEN ---
PRIMARY_NODE_IP="192.168.178.10"
RECOVERY_NODE_IP="192.168.178.50"
RECOVERY_NODE_MAC="00:11:22:33:44:55" # Wird für Wake-on-LAN benötigt

# --- FEATURES AKTIVIEREN (true/false) ---
ENABLE_TAILSCALE_RESTART="true"
ENABLE_WATCHDOG="true"
ENABLE_TELEGRAM="false"

# --- BENACHRICHTIGUNGEN (Optional) ---
TELEGRAM_BOT_TOKEN="dein_bot_token"
TELEGRAM_CHAT_ID="deine_chat_id"